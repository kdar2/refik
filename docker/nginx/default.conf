server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # ─── Güvenlik ───
    # Header'lar Laravel SecurityHeaders middleware tarafından gönderiliyor;
    # nginx burada yalnızca tokens off ve dosya filtrelerini uyguluyor.
    server_tokens off;

    # ─── Gzip (Brotli ayrı modül gerektirir; nginx:alpine'da yok) ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Body limits ───
    client_max_body_size 12M;

    # ─── Vite build çıktısı — uzun cache (hash'li dosyalar) ───
    location ~* ^/build/.*\.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ─── Diğer statik varlıklar ───
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── HTML / dinamik (PHP) ───
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ─── Hassas dosyaları gizle ───
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~* \.(env|log|sqlite|sql|md|lock|json)$ {
        deny all;
    }

    # ─── Sağlık kontrolü için cache yok ───
    location = /up {
        try_files $uri /index.php?$query_string;
        add_header Cache-Control "no-store";
    }
}
