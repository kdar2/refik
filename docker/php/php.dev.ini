; ─── Refik DEV PHP ayarları ───
; Windows bind-mount overhead'ini telafi etmek için stat çağrılarını minimize eder.

; Memory & yükleme
memory_limit = 256M
upload_max_filesize = 12M
post_max_size = 12M
max_execution_time = 60

; Output
expose_php = Off

; OPcache — Windows bind-mount FS overhead'ini büyük oranda etkisiz kılar.
; revalidate_freq=2 saniye: değişiklikler ~2sn'de bir kontrol edilir,
; her include'da stat() çağrısı yapılmaz. Dev'de mantıklı denge.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
; revalidate_freq=10: her 10sn'de bir dosya değişikliği kontrolü.
; Kod değiştirip anında görmek için: docker compose exec app php -r 'opcache_reset();'
opcache.validate_timestamps = 1
opcache.revalidate_freq = 10
opcache.interned_strings_buffer = 16
opcache.fast_shutdown = 1
opcache.jit_buffer_size = 64M
opcache.jit = 1255

; Realpath cache — bind mount stat'ları için kritik
realpath_cache_size = 16M
realpath_cache_ttl = 600

; Session güvenliği
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
