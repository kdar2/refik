; Refik DEV — PHP-FPM pool override (default www.conf üzerine yazılır).
; Eşzamanlı request kapasitesini varsayılan 5'ten 15'e çıkarır.

[www]
user = www
group = www

listen = 9000
listen.owner = www
listen.group = www

pm = dynamic
pm.max_children = 15
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
