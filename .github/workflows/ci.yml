name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Lint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, sqlite, pdo_sqlite, gd, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Composer cache
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}

      - name: Install Composer deps
        working-directory: src
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy .env
        working-directory: src
        run: |
          cp .env.example .env || true
          php artisan key:generate

      - name: Pint (lint)
        working-directory: src
        continue-on-error: true
        run: ./vendor/bin/pint --test

      - name: Install npm deps
        working-directory: src
        run: npm ci --no-audit --no-fund

      - name: Vite build
        working-directory: src
        run: npm run build

      - name: PHP tests
        working-directory: src
        run: php artisan test --parallel || php artisan test

  deploy:
    name: Deploy to production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/refik
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T app php artisan optimize
            docker compose -f docker-compose.prod.yml exec -T app php artisan storage:link || true
