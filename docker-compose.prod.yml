# Production stack — host'ta `docker compose -f docker-compose.prod.yml up -d` ile çalıştırılır.
# Farklı port (443/80), DB cache + queue + session, opcache açık, build edilmiş asset'ler image içine kopyalanır.

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: refik-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app-storage:/var/www/storage
      - app-bootstrap-cache:/var/www/bootstrap/cache
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://refikdernegi.org}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-refik}
      DB_USERNAME: ${DB_USERNAME:-refik}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-iyzico}
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
    depends_on:
      mysql:
        condition: service_healthy
    networks: [refik]

  nginx:
    image: nginx:alpine
    container_name: refik-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro                # gerçek deploy'da app:/var/www/public ile paylaşılan volume
      - app-storage:/var/www/storage:ro            # storage/app/public uploads için
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on: [app]
    networks: [refik]

  mysql:
    image: mysql:8.0
    container_name: refik-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-refik}
      MYSQL_USER: ${DB_USERNAME:-refik}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [refik]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${DB_USERNAME} -p$${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    image: refik-app:latest
    container_name: refik-scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    depends_on: [app]
    environment:
      APP_ENV: production
    volumes:
      - app-storage:/var/www/storage
    networks: [refik]

  queue:
    image: refik-app:latest
    container_name: refik-queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    depends_on: [app, mysql]
    environment:
      APP_ENV: production
    volumes:
      - app-storage:/var/www/storage
    networks: [refik]

networks:
  refik:
    driver: bridge

volumes:
  mysql-data:
  app-storage:
  app-bootstrap-cache:
